name: go-e Auto-Import

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install firebase-admin
        working-directory: .github/scripts

      - name: Poll go-e API and import to Firestore
        env:
          GOE_SERIAL: ${{ secrets.GOE_SERIAL }}
          GOE_TOKEN: ${{ secrets.GOE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/goe-import.js
